{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">

My Foods

</h2>

<a href="{% url 'add-food' %}" class="btn btn-primary mb-3">

+ Add Food

</a>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>Image</th>

<th>Name</th>

<th>Category</th>

<th>Price</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for food in foods %}

<tr>

<td>

<img
src="{{ food.image.url }}"
width="80"
height="80"
>

</td>

<td>

{{ food.name }}

</td>

<td>

{{ food.category }}

</td>

<td>

₹{{ food.price }}

</td>

<td>

{% if food.is_available %}

<span class="badge bg-success">

Available

</span>

{% else %}

<span class="badge bg-danger">

Out of Stock

</span>

{% endif %}

</td>

<td>

<a
href="{% url 'update-food' food.id %}"
class="btn btn-warning btn-sm">

Edit

</a>

<a
href="{% url 'delete-food' food.id %}"
class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
