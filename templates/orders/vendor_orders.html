{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">

🏪 Vendor Orders

</h2>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Customer</th>

<th>Total</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for order in orders %}

<tr>

<td>

#{{ order.id }}

</td>

<td>

{{ order.user.username }}

</td>

<td>

₹{{ order.total_amount }}

</td>

<td>

<span class="badge bg-warning">

{{ order.status }}

</span>

</td>

<td>

<a href="{% url 'update-order-status' order.id 'Accepted' %}"
class="btn btn-primary btn-sm">

Accept

</a>

<a href="{% url 'update-order-status' order.id 'Preparing' %}"
class="btn btn-info btn-sm">

Preparing

</a>

<a href="{% url 'update-order-status' order.id 'Delivered' %}"
class="btn btn-success btn-sm">

Delivered

</a>

<a href="{% url 'update-order-status' order.id 'Cancelled' %}"
class="btn btn-danger btn-sm">

Cancel

</a>

</td>

</tr>

{% empty %}

<tr>

<td colspan="5" class="text-center">

No Orders Yet

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
